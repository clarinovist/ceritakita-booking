services:
  # Next.js Application Service
  app:
    image: ghcr.io/clarinovist/ceritakita-booking:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   target: runner
    container_name: ceritakita-booking
    user: "1001:1001"
    ports:
      - "3001:3000"
    volumes:
      # Bind mounts for persistent data (synced with host)
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://ceritakitastudio.site}

    env_file:
      - .env.local
    restart: unless-stopped
    networks:
      - ceritakita-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security options
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# Network for service communication
networks:
  ceritakita-network:
    driver: bridge
    name: ceritakita-network
