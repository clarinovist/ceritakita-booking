# Telegram Report Scheduler
# Mengirim laporan harian lengkap (booking + ads + WA clicks) ke Telegram
# Jam 08:00 WIB = 01:00 UTC
name: Telegram Report Scheduler

on:
  schedule:
    # Setiap hari jam 08:00 WIB (01:00 UTC)
    - cron: '0 1 * * *'

  # Trigger manual untuk testing
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Jenis laporan (daily saja yang tersedia)'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily

jobs:
  send-telegram-report:
    runs-on: ubuntu-latest
    steps:
      - name: Kirim laporan harian ke Telegram
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "x-cron-secret: ${{ secrets.REPORT_CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/telegram/send-report?type=daily")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Gagal mengirim laporan. HTTP Status: $HTTP_STATUS"
            exit 1
          fi

          SUCCESS=$(cat /tmp/response.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('success', False))")
          if [ "$SUCCESS" != "True" ]; then
            echo "❌ API mengembalikan success=false"
            exit 1
          fi

          echo "✅ Laporan harian berhasil dikirim ke Telegram"